name: Update problem count

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  count:
    name: Count problems and update README
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update README problem count
        run: python3 scripts/count_problems.py

      - name: Create README update pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update problem count [skip ci]"
          title: "chore: update problem count"
          body: "Automated README problem count update."
          branch: chore/update-problem-count
          delete-branch: true
          add-paths: README.md
